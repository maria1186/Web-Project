<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="open-meteo.css">
</head>
<body>
    <div id="search">
        <h1>Weather Forecast Search</h1>

        <label for="location">Enter location (city): </label>
        <input type="text" id="location" placeholder="e.g., Berlin">
        <button id="search-btn">Search</button>
    </div>
    <div id="current-weather" class="weather-info"></div>
    <script src="open-meteo.js"></script>
</body>
</html>
